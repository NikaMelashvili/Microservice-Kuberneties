version: '3.8'
services:
  auth-service:
    build: ./auth-service
    ports:
      - '3000:3000'
    environment:
      - DATABASE_URI=mongodb://mongo:27017/devops-final
      - JWT_SECRET=3cba3392ee5a5a7f945101035463b6e03cf0e9a1050ec1d66413fb4b01d3d54e
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - app-network

  media-service:
    build: ./media-service
    ports:
      - '5000:5000'
    depends_on:
      - postgres
    environment:
      - DATABASE_URI=postgresql://user:123@postgres:5432/devops_final
      - JWT_SECRET_KEY=3cba3392ee5a5a7f945101035463b6e03cf0e9a1050ec1d66413fb4b01d3d54e
    networks:
      - app-network

  comment-service:
    build: ./comment-service
    ports:
      - '8080:8080'
    depends_on:
      - mysql
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/devops_final
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=123
    networks:
      - app-network

  social-front:
    build: ./social-front
    ports:
      - '5173:5173'
    depends_on:
      - auth-service
    networks:
      - app-network

  mongo:
    image: mongo:latest
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - app-network

  mysql:
    image: mysql:8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123
      MYSQL_DATABASE: devops_final
    ports:
      - '3306:3306'
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - app-network

  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: devops_final
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongo-data:
  mysql-data:
  postgres-data:
