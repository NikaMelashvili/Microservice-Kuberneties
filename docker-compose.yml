version: '3.8'
services:
  mongo:
    image: mongo:latest
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - app-network

  auth-service:
    build: ./auth-service
    ports:
      - '3000:3000'
    env_file:
      - ./env/mongo.env
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - app-network

  postgres:
    image: postgres:15
    restart: always
    env_file:
      - ./env/social-postgress.env
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -h localhost',
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  media-service:
    build: ./media-service
    ports:
      - '5001:5000'
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./env/social-postgress.env
    networks:
      - app-network

  mysql:
    image: mysql:8
    restart: always
    env_file:
      - ./env/mysql.env
    ports:
      - '3306:3306'
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 5s
      timeout: 5s
      retries: 10

  comment-service:
    build: ./comment-service
    ports:
      - '8080:8080'
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - ./env/comment-service.env
    networks:
      - app-network

  social-front:
    build: ./social-front
    ports:
      - '5173:80'
    depends_on:
      - auth-service
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongo-data:
  mysql-data:
  postgres-data:
